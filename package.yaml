name: linear-locks
version: 0.1.0.1
github: 'dcastro/linear-locks'
license: BSD-3-Clause
author: 'Diogo Castro'
maintainer: 'dc@diogocastro.com'
copyright: '2026 Diogo Castro'
category: Concurrency, Parallelism, Mutable State

tested-with: GHC == 9.10.3
  , GHC == 9.12.4
  , GHC == 9.14.1

extra-source-files:
  - README.md
extra-doc-files:
  - CHANGELOG.md

synopsis: Locking primitives free of deadlocks.
description: |
  `linear-locks` provides locking primitives that are statically guaranteed to be free of deadlocks.
  Please see the README on GitHub at <https://github.com/dcastro/linear-locks#readme>

language: GHC2024

default-extensions:
  - BlockArguments
  - StrictData
  - TypeFamilies

ghc-options:
  - -Weverything
  - -Wno-name-shadowing
  - -Wno-missing-exported-signatures
  - -Wno-missing-import-lists
  - -Wno-missing-export-lists
  - -Wno-missed-specialisations
  - -Wno-all-missed-specialisations
  - -Wno-unsafe
  - -Wno-safe
  - -Wno-missing-local-signatures
  - -Wno-monomorphism-restriction
  - -Wno-implicit-prelude
  - -Wno-prepositive-qualified-module
  - -Wno-missing-safe-haskell-mode
  - -Wno-missing-kind-signatures
  - -Wno-missing-role-annotations

library:
  source-dirs: src
  dependencies:
    # We're using `RequiredTypeArguments` which was introduced in GHC 9.10.1, which comes with base 4.20.0.
    # https://wiki.haskell.org/Base_package
    - base >= 4.20 && < 5
    - linear-base >= 0.4.0
    - stm-containers >= 1.2.1
    - focus >= 1.0.3.2
    - atomic-primops >= 0.8.4
    - vector >= 0.13.1.0
    - vector-algorithms >= 0.9.0.1
    - containers >= 0.6.8
    - deepseq >= 1.5.0.0
    - concurrent-extra >= 0.7.0.12

tests:
  linear-locks-test:
    main: Spec.hs
    source-dirs: test
    dependencies:
      - base
      - linear-locks
      - linear-base
      - sydtest
      - stm-containers
      - list-t
      - vector
      - concurrent-extra
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    build-tools:
      - sydtest-discover:sydtest-discover
